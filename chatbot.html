<!DOCTYPE html>
<html>
<head>
    <title>ChatBot</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin-top: 0px;
            margin-bottom: 0px;
        }
        .send-button {
            background-color: rgb(25, 135, 84);
            color: white;
            padding: 12px 20px;
            margin-left: 10px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }

        .chat-input {
            padding: 12px 15px;
            border-radius: 10px;
            border-width: 1px;
            font-size: 15px;
            flex-grow: 1;  /*Flex-grow makes an element grow and take up the remaining space*/

        }

        .chat-input-container {
            display: flex;
            margin-bottom: 60px;
        }

        .app-container {
            max-width: 600px; /*Maximum width an element is allowed to grow to,This allows our app to grow until certain pixels*/
            margin-left : auto;
            margin-right: auto;
            height: 100vh;   /*Stretching the App component to the bottom. vh means viewport height(the height of the browser),100vh means 100% of the height of the browser*/
            display: flex;
            flex-direction: column;
            /*margin-left and margin-right are set to auto then the item is horizontally centered*/
            /*flex-grow makes an element grow and take up the remaining space*/
        }

        .chat-message-user {
            display: flex;
            justify-content: end;
            align-items: start;
        }

        .chat-message-robot {
            display: flex;
            align-items: start;
        }

        .chat-message-text {
            background-color: rgb(238, 238, 238);
            padding: 15px 20px;
            border-radius: 10px;
            margin-right: 10px;
            margin-left: 10px;
            margin-bottom: 20px;
            max-width: 300px;
        }

        .chat-message-profile {
            width: 45px;
        }

        .chat-messages-container {
            flex-grow: 1;
            margin-top: 20px;
            overflow: scroll;
            scrollbar-width: none; /*It hides the scroll bar*/
        }

    /*When a block element is inside a flexbox,it no longer takes up the entire line,it only takes as much space as it needs to*/
    /*Main axis is Horizontal,Cross axis is vertical,for Main axis we use justify-content ans for cross axis we use align-items*/
    /*    Element inside a flexbox stretch vertically,the image stretches,to fix this we use align-items,set to start by default they set to stretch*/
    </style>
</head>
<body>
<div class="js-container"></div>

<script src="https://unpkg.com/supersimpledev/react.js"></script>
<script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

<script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

<script src="https://unpkg.com/supersimpledev/babel.js"></script>
<script type="text/babel">

    function ChatInput({ chatMessages, setChatMessages }) {
        const [inputText, setInputText] = React.useState(""); // inputText contains the current text,setInputText is the updater function

        function saveInputText(event) {
            setInputText(event.target.value);
        }

        function sendMessage() {
            const newChatMessages = [
                ...chatMessages,
                {
                    message: inputText,
                    sender: 'user',
                    id: crypto.randomUUID()
                }
            ]

            setChatMessages(newChatMessages);
            // chatMessage is not updated the array immediately,we can't see our message

            // Using chatbot external library to get response
            const response = Chatbot.getResponse(inputText);
            // console.log(response);
            setChatMessages([
                ...newChatMessages,
                {
                    message: response,
                    sender: 'robot',
                    id: crypto.randomUUID()
                }
            ]);

            setInputText(""); // update the InputText to be empty after typing the message,instead of manually removing the text in input
        }

        // when onChange runs the functions it gives a parameter called event,
        // it is an object, contains info about change
        // console.log(event.target.value);
        // State = save data that changes over time
        // We should mention the initial value in React.useState()
        // value change the text inside this <input>,makes the text box empty,this is called controlled input
        return (
            <div className="chat-input-container">
                <input
                    className="chat-input"
                    placeholder="Send a message to Chatbot"
                    size="30"
                    onChange={saveInputText}
                    value={inputText}
                />
                <button
                    onClick={sendMessage}
                    className="send-button"
                >Send</button>
            </div>
        );
    }

    function ChatMessage({ message, sender }) { // destructuring here it self
        // console.log(props)
        // const message = props.message;
        // const sender = props.sender;
        // const { message, sender } = props;  // Destructuring,saves them in a variable called message and sender
        /*
        if (sender === 'robot') {
            return (
                <div>
                    <img src="robot.png" width="50" />
                    {message}
                </div>
            );
        }
        {sender === 'robot' && <img src="robot.png" width="50" />} The above can be written like this using guard Operator
         */

        // Below we are giving different classnames based on the input from user and the response from robot
        // Using Ternary Operator(?:) value1 ? value2 : value39if value 1 is true then the result is value1 else value2)
        return (
            <div className={
                sender === 'user'
                    ? 'chat-message-user'
                    : 'chat-message-robot'
            }>
                {sender === 'robot' &&
                    (<img src="robot.png" className="chat-message-profile" />)
                }
                <div className="chat-message-text">
                    {message}
                </div>
                {sender === 'user' &&
                    (<img src="user.png" className="chat-message-profile" />)
                }
            </div>
        );
    }

    function ChatMessages({ chatMessages }) {
       const chatMessagesRef =  React.useRef(null); // Initial value is set to null because it starts out empty

        React.useEffect(() => {
            const containerElem = chatMessagesRef.current;
            if(containerElem) {
                containerElem.scrollTop = containerElem.scrollHeight;  // Helps us to scroll down automatically when the message is created
            }
        }, [chatMessages]);

        return (
            <div className="chat-messages-container" ref={chatMessagesRef}>
                {chatMessages.map((chatMessage) => {
                    return (
                        <ChatMessage
                            message={chatMessage.message}
                            sender={chatMessage.sender}
                            key={chatMessage.id}
                        />
                    );
                })}
            </div>
        );
    }

    function App() {
        const [chatMessages, setChatMessages] = React.useState([{
            message: 'hello chatbot',
            sender: 'user',
            id: 'id1'
        }, {
            message: 'Hello! How can I help you?',
            sender: 'robot',
            id: 'id2'
        },{
            message: 'Can you get me today date?',
            sender: 'user',
            id: 'id3'
        }, {
            message: 'Today is February 22',
            sender: 'robot',
            id: 'id4'
        }]);

        // const [chatMessages, setChatMessages] = array; // Array destructing, the order matters
        // const chatMessages = array[0]; // The first value gives the current value of chatMessages(The current data)
        // const setChatMessages = array[1]; // The second value is a function that updates the data,naming is important starts with set,
        // we should always use the function setChatMessages to update the data also called Updater Function
        // setChatMessages replaces the entire chatMessages array with a new array,that's how it works,add a new chat message at the end

        return (
            <div className="app-container">
                <ChatMessages
                    chatMessages={chatMessages}
                />
                <ChatInput
                    chatMessages={chatMessages}
                    setChatMessages={setChatMessages}
                />
            </div>
        );
    }

    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />);
</script>
</body>
</html>

<!--Self-closing element <input></input>,when there is nothing inside we can use shortcut-->
<!--Props makes components reusable-->
<!--Use a component(App) to create the website-->
<!--State=data that is connected to the HTML,When we update this data,it will update the HTML-->
<!--// .push add a value at the end of the array chatMessages-->
<!--// crypto.randomUUID(); generates a unique id string-->
<!--// Convert chatMessages into state we can update the HTML and can see changes in the web-->
<!--// ... is a Spread Operator=takes the values in an array, and copies them into a new array-->

<!--To add auto-scrolling we have to learn a concept called hooks-->
<!--Hooks=insert react features into our component-->
<!--React.useState() is a hook, State automatically updates the HTML when the data changes-->
<!--React hooks starts with the work use,useEffect run some code after the component is created or updated-->
<!--React.useEffect(() => {console.log("Updated");}, [chatMessages]) this array is called dependency array,it lets us control when useEffect() runs;-->
<!--It takes a array it only runs once,after the component is created,React will also run the function every time chatMessages changes-->
<!--useRef() automatically save an HTML element from the component-->
